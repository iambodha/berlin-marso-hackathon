# @package _global_
# RGB + STATE Diffusion Policy: scene-cam image + robot proprioception + PRIVILEGED scene state
# (parcel poses/tags, bin positions/colours). The organisers enabled state+image, and the env
# now exposes this in every obs mode with parcel slots zero-padded to MAX_PARCELS=6, so the
# observation is a FIXED size at every difficulty -> ONE general checkpoint runs on easy/medium/
# hard. ResNet18 + SpatialSoftmax image encoder. --capture-video logs an eval mp4 every eval_freq.
#
# PREREQUISITE: build the image+state dataset once (adds the privileged state to the rgb demos):
#   pixi run python il/add_state_to_rgb_demos.py --levels medium                # train-on-medium
#   pixi run python il/add_state_to_rgb_demos.py --levels easy medium hard --out combined  # general
#
# Then train (demo_dir must match the --out name above):
#   pixi run python il/train.py method=dp_rgb demo_dir=medium
#   pixi run python il/train.py method=dp_rgb demo_dir=combined
#
# On-the-fly RGB augmentation (color jitter etc.) is ENABLED below: it multiplies the effective
# image variety so you can train longer without overfitting the exact training pixels.
baseline_dir: diffusion_policy
script: train_rgbd.py
demo_kind: rgbstate
flags:
  obs_mode: rgb
  obs_camera: scene
  visual_encoder: resnet18
  num_kp: 32
  total_iters: 40000
  batch_size: 128
  obs_horizon: 2
  act_horizon: 8
  pred_horizon: 16
  lr: 1.0e-4
  num_eval_envs: 4
  num_eval_episodes: 8
  eval_freq: 5000
  log_freq: 1000
  save_freq: 10000
  capture_video: true
  exp_name: warehouse_rgb_dp_medium
  # --- data augmentation (training only, label-preserving) ---
  rgb_aug: true
  aug_brightness: 0.3
  aug_contrast: 0.3
  aug_saturation: 0.3
  aug_hue: 0.05
  aug_noise: 0.0
  aug_translate: 0
  aug_prob: 1.0
