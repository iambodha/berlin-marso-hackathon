# @package _global_
# State Diffusion Policy (MAIN track): privileged low-dim state obs. The end-to-end baseline
# wired into eval.py. State input is parcel-count-specific -> train one checkpoint PER level.
baseline_dir: diffusion_policy
script: train.py
demo_kind: state
flags:
  total_iters: 30000
  batch_size: 256
  obs_horizon: 2
  act_horizon: 8
  pred_horizon: 16
  lr: 1.0e-4
  num_eval_envs: 8       # GPU backend batches all envs in 1 process — no multiprocessing issues
  num_eval_episodes: 16
  eval_freq: 5000        # evaluate every N iters; 0 = skip eval entirely
  eval_inference_steps: 16   # denoising steps during eval rollouts (lower = faster feedback; 8-10 ok)
  state_aug_noise: 0.0       # train-time Gaussian noise on the state obs (data aug); try 0.01-0.03
  log_freq: 1000
  save_freq: null          # optional extra saves; a numbered checkpoint is saved after every eval
  capture_video: false   # no video; eval envs are created/destroyed each eval run
  exp_name: warehouse_state_dp_easy
  early_stop_patience: 5
  early_stop_metric: sort_accuracy
  # resume: il/baselines/diffusion_policy/runs/warehouse_state_dp_easy/checkpoints/latest.pt
